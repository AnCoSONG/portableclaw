name: Build Portable Packages

on:
  workflow_dispatch:
    inputs:
      openclaw_version:
        description: "OpenClaw version (npm dist-tag or semver)"
        default: "latest"
      node_version:
        description: "Node.js version"
        default: "22.14.0"
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  NODE_VERSION: ${{ inputs.node_version || '22.14.0' }}
  OPENCLAW_VERSION: ${{ inputs.openclaw_version || 'latest' }}

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14
            target: darwin-arm64
          - os: macos-15-intel
            target: darwin-x64
          - os: ubuntu-latest
            target: linux-x64
          - os: ubuntu-24.04-arm
            target: linux-arm64
          - os: windows-latest
            target: win-x64

    runs-on: ${{ matrix.os }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Import Apple signing certificate
        if: runner.os == 'macOS'
        env:
          P12_BASE64: ${{ secrets.APPLE_CERT_P12_BASE64 }}
          P12_PASSWORD: ${{ secrets.APPLE_CERT_PASSWORD }}
        shell: bash
        run: |
          if [[ -z "${P12_BASE64:-}" ]]; then
            echo "::notice::Apple certificate not configured — skipping code signing"
            exit 0
          fi
          KEYCHAIN="$RUNNER_TEMP/signing.keychain-db"
          KEYCHAIN_PW="$(openssl rand -hex 16)"
          security create-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          security set-keychain-settings -lut 21600 "$KEYCHAIN"
          security unlock-keychain -p "$KEYCHAIN_PW" "$KEYCHAIN"
          echo "$P12_BASE64" | base64 --decode > "$RUNNER_TEMP/cert.p12"
          security import "$RUNNER_TEMP/cert.p12" -P "$P12_PASSWORD" \
            -A -t cert -f pkcs12 -k "$KEYCHAIN"
          rm -f "$RUNNER_TEMP/cert.p12"
          security set-key-partition-list -S apple-tool:,apple: \
            -s -k "$KEYCHAIN_PW" "$KEYCHAIN"
          security list-keychains -d user -s "$KEYCHAIN" \
            $(security list-keychains -d user | tr -d '"')
          IDENTITY=$(security find-identity -v -p codesigning "$KEYCHAIN" \
            | grep "Developer ID" | head -1 | sed 's/.*"\(.*\)".*/\1/')
          if [[ -z "$IDENTITY" ]]; then
            echo "::error::No Developer ID Application certificate found"
            exit 1
          fi
          echo "APPLE_SIGNING_IDENTITY=$IDENTITY" >> "$GITHUB_ENV"
          echo "KEYCHAIN_PATH=$KEYCHAIN" >> "$GITHUB_ENV"
          echo "Signing identity: $IDENTITY"

      - name: Build portable package
        shell: bash
        run: bash build.sh ${{ matrix.target }}
        env:
          NODE_VERSION: ${{ env.NODE_VERSION }}
          OPENCLAW_VERSION: ${{ env.OPENCLAW_VERSION }}

      - name: Notarize macOS package
        if: runner.os == 'macOS' && env.APPLE_SIGNING_IDENTITY
        env:
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER_ID: ${{ secrets.APPLE_API_ISSUER_ID }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
        shell: bash
        run: |
          if [[ -z "${APPLE_API_KEY_ID:-}" ]]; then
            echo "::warning::Notarization credentials not configured — skipping"
            exit 0
          fi
          KEY_DIR="$HOME/.private_keys"
          KEY_FILE="$KEY_DIR/AuthKey_${APPLE_API_KEY_ID}.p8"
          mkdir -p "$KEY_DIR"
          echo "$APPLE_API_KEY_P8_BASE64" | base64 --decode > "$KEY_FILE"

          WORK="$RUNNER_TEMP/notarize"
          mkdir -p "$WORK"
          tar -xzf dist/portableclaw-${{ matrix.target }}.tar.gz -C "$WORK"
          ditto -c -k --keepParent \
            "$WORK/portableclaw-${{ matrix.target }}" "$WORK/submit.zip"

          NOTARY_AUTH=(--key "$KEY_FILE" --key-id "$APPLE_API_KEY_ID" --issuer "$APPLE_API_ISSUER_ID")

          OUTPUT=$(xcrun notarytool submit "$WORK/submit.zip" \
            "${NOTARY_AUTH[@]}" --wait --timeout 30m 2>&1) || true
          echo "$OUTPUT"

          SUBMISSION_ID=$(echo "$OUTPUT" | grep -m1 '^\s*id:' | awk '{print $2}')

          if echo "$OUTPUT" | grep -q 'status: Accepted'; then
            echo "Notarization succeeded"
          else
            echo "::error::Notarization failed — fetching detailed log..."
            if [[ -n "$SUBMISSION_ID" ]]; then
              xcrun notarytool log "$SUBMISSION_ID" "${NOTARY_AUTH[@]}" \
                "$WORK/notarization-log.json" 2>&1 || true
              echo "--- Notarization Log ---"
              cat "$WORK/notarization-log.json" 2>/dev/null || echo "(log unavailable)"
              echo "--- End Log ---"
            fi
            rm -rf "$WORK" "$KEY_DIR"
            exit 1
          fi

          rm -rf "$WORK" "$KEY_DIR"

      - name: Clean up Apple keychain
        if: always() && env.KEYCHAIN_PATH
        shell: bash
        run: security delete-keychain "$KEYCHAIN_PATH" 2>/dev/null || true

      - name: Upload artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: portableclaw-${{ matrix.target }}
          path: dist/portableclaw-${{ matrix.target }}.*
          retention-days: 30

  release:
    if: startsWith(github.ref, 'refs/tags/v') || github.event_name == 'workflow_dispatch'
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts

      - name: List artifacts
        run: find artifacts -type f | sort

      - name: Determine tag name
        id: tag
        run: |
          if [[ "${{ github.ref }}" == refs/tags/* ]]; then
            echo "tag=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=v$(date +%Y%m%d)-${GITHUB_SHA::7}" >> "$GITHUB_OUTPUT"
          fi

      - name: Generate checksums
        run: |
          cd artifacts
          find . -type f \( -name '*.tar.gz' -o -name '*.zip' \) -exec sha256sum {} \; | sort > ../SHA256SUMS.txt
          cat ../SHA256SUMS.txt

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.tag.outputs.tag }}
          name: "PortableClaw ${{ steps.tag.outputs.tag }}"
          draft: false
          prerelease: false
          generate_release_notes: true
          files: |
            artifacts/**/*.tar.gz
            artifacts/**/*.zip
            SHA256SUMS.txt
          body: |
            ## PortableClaw ${{ steps.tag.outputs.tag }}

            Pre-built portable OpenClaw packages. Download, extract, double-click `start` to run.

            **Node.js**: v${{ env.NODE_VERSION }} | **OpenClaw**: ${{ env.OPENCLAW_VERSION }}

            ### Downloads

            | Platform | Architecture | File |
            |----------|-------------|------|
            | macOS | Apple Silicon (M1/M2/M3) | `portableclaw-darwin-arm64.tar.gz` |
            | macOS | Intel | `portableclaw-darwin-x64.tar.gz` |
            | Linux | x86_64 | `portableclaw-linux-x64.tar.gz` |
            | Linux | ARM64 | `portableclaw-linux-arm64.tar.gz` |
            | Windows | x86_64 | `portableclaw-win-x64.zip` |

            ### Quick Start

            **macOS / Linux**: Extract, then double-click `start.command` (macOS) or run `./start.sh` (Linux).

            **Windows**: Extract the zip, then double-click `start.bat`.

            ### Verify (optional)

            ```bash
            sha256sum -c SHA256SUMS.txt
            ```
